<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>main page</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <style>
            .checked {
              color: orange;
            }
        </style>
    </head>
    <body>
        <h1>searchRoom page</h1>
        <a href="index.html">mainpage</a>

        <div class="star-rating">
            <p>
                star rating:
                <span class="fa fa-star checked"></span>
                <span class="fa fa-star"></span>
                <span class="fa fa-star"></span>
                <span class="fa fa-star"></span>
                <span class="fa fa-star"></span>

                <select>
                    <option value="1">1 star</option>
                    <option value="2">2 stars</option>
                    <option value="3">3 stars</option>
                    <option value="4">4 stars</option>
                    <option value="5">5 stars</option>
                </select>
            </p>
        </div>

        <div>
            <input type="text" placeholder="startDate">
            <input type="text" placeholder="endDate">
        </div>

        <div>
            <p>room size:
                <select>
                    <option>Single</option>
                    <option>Double</option>
                </select>
            </p>
        </div>

        <div>
            <p>location:
                <select>
                    <option>ottawa</option>
                    <option>gatineau</option>
                </select>
            </p>
        </div>

        <div>
            <p>hotel chain:
                <select>
                    <option>hilton</option>
                    <option>Château Laurier</option>
                </select>
            </p>
        </div>

        <div>
            <p>hotel's total rooms:
                <input type="text" placeholder="Enter total room value">
            </p>
        </div>

        <div>
            <p>price:
                <input type="number" placeholder="min price">
                <input type="number" placeholder="max price">
            </p>
        </div>

        <button type="submit">submit</button>

        <div>
            <h3>result</h3>
            <p>[output will come here]</p>
            <button type="submit">booking</button>
            <button type="submit">renting</button>
        </div>

    </body>
</html>
