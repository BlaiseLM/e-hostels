<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>customer manage page</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1>customer manage page</h1>
        <a href="index.html">mainpage</a><br><br>
        <p>customer search</p>

        <input id="firstName" type="text" placeholder="first name"><br>
        <input id="lastName" type="text" placeholder="last name"><br>
        <input id="address" type="text" placeholder="address"><br>
        <input id="idType" type="text" placeholder="ID type"><br>
        <input id="idValue" type="text" placeholder="ID value"><br>
        <input id="id" type="text" placeholder="ID number"><br>

        <button id="searchButton">(search) customer</button>
        <button id="addButton">add</button>
        <button id="editButton">edit</button>
        <button id="deleteButton">delete</button>
        <div id="output">[output will come here]</div>

        <script>
            //create
            document.getElementById("addButton").addEventListener("click", () => {
                const firstName = document.getElementById("firstName").value;
                const lastName = document.getElementById("lastName").value;
                const address = document.getElementById("address").value;
                const idType = document.getElementById("idType").value;
                const idValue = document.getElementById("idValue").value;
                const registrationDate = new Date().toISOString().split('T')[0];

                fetch("/customers", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({firstName, lastName, address, idType, idValue, registrationDate})
                }).then(response => {
                    if (response.ok) {
                        document.getElementById("output").innerText = "Customer added successfully!";
                    } else {
                        document.getElementById("output").innerText = "failed to add customer";
                    }
                })
            });

            //update(edit)
            document.getElementById("editButton").addEventListener("click", () => {
                const id = document.getElementById("id").value;
                const firstName = document.getElementById("firstName").value;
                const lastName = document.getElementById("lastName").value;
                const address = document.getElementById("address").value;
                const idType = document.getElementById("idType").value;
                const idValue = document.getElementById("idValue").value;

                fetch(`/customers/${id}`, {
                    method: "PUT",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({firstName, lastName, address, idType, idValue})
                }).then(response => {
                    if (response.ok) {
                        document.getElementById("output").innerText = "Customer edited successfully!";
                    } else {
                        document.getElementById("output").innerText = "failed to edit customer";
                    }
                })
            });

            //delete
            document.getElementById("deleteButton").addEventListener("click", () => {
                const id = document.getElementById("id").value;

                fetch(`/customers/${id}`, {
                    method: "DELETE"
                }).then(response => {
                    if (response.ok) {
                        document.getElementById("output").innerText = "Customer's id deleted successfully!";
                    } else {
                        document.getElementById("output").innerText = "failed to delete customer";
                    }
                })
            });

            //search
            document.getElementById("searchButton").addEventListener("click", () => {
                const firstName = document.getElementById("firstName").value;
                const lastName = document.getElementById("lastName").value;
                const address = document.getElementById("address").value;
                const idType = document.getElementById("idType").value;
                const idValue = document.getElementById("idValue").value;

                fetch(`/customers/search?firstName=${firstName}&lastName=${lastName}&address=${address}&idType=${idType}&idValue=${idValue}`, {
                    method: "GET"
                })
                .then(response => response.json())
                .then(data => {
                    if (data.length > 0) {
                        let table = "<table><tr><th>ID</th><th>First Name</th><th>Last Name</th><th>Address</th><th>ID Type</th><th>ID Value</th><th>Registration Date</th></tr>";
                        for (let i = 0; i < data.length; i++) {
                            table += "<tr>";
                            table += "<td>" + data[i].id + "</td>";
                            table += "<td>" + data[i].first_name + "</td>";
                            table += "<td>" + data[i].last_name + "</td>";
                            table += "<td>" + data[i].address + "</td>";
                            table += "<td>" + data[i].id_type + "</td>";
                            table += "<td>" + data[i].id_value + "</td>";
                            table += "<td>" + data[i].registration_date + "</td>";
                            table += "</tr>";
                        }
                        table += "</table>";
                        document.getElementById("output").innerHTML = table;
                    } else {
                        document.getElementById("output").innerText = "No customers found";
                    }
                });
            });

        </script>
    </body>
</html>
